<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK FM - Kişisel Çalma Listeli Radyo Simülatörü</title>
    <meta name="description" content="BLACK FM: Kendi şarkılarınızı yükleyin, otomatik jingle geçişleri ve neon ses görselleştirici ile kendi radyo istasyonunuzu oluşturun.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- HLS.js for HLS (.m3u8) streaming fallback support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Neon Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="brand">
                <div class="brand-logo">
                    <i data-lucide="radio" class="glow-icon-green"></i>
                </div>
                <div class="brand-text">
                    <h1>BLACK <span class="accent-text">FM</span></h1>
                    <p class="subtitle">RAP & HIPHOP LIVE RADIO</p>
                </div>
            </div>
            <div class="header-controls">
                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span id="stream-status">YAYIN HAZIR</span>
                </div>
            </div>
        </header>

        <!-- MAIN GRID -->
        <main class="app-grid">
            <!-- LEFT: PLAYER PANEL -->
            <section class="panel player-panel glassmorphism">
                <div class="deck-container">
                    <!-- Neon Cassette / Glowing Vinyl Disk -->
                    <div class="vinyl-wrapper">
                        <div class="vinyl" id="vinyl-disk">
                            <div class="vinyl-center"></div>
                            <div class="vinyl-lines"></div>
                            <div class="vinyl-label">
                                <span class="label-brand">BLACK FM</span>
                                <span class="label-freq">99.9 MHz</span>
                            </div>
                        </div>
                        <div class="play-state-overlay">
                            <i data-lucide="play" id="overlay-play-icon"></i>
                        </div>
                    </div>

                    <!-- Now Playing Info -->
                    <div class="track-info">
                        <div class="badge-container">
                            <span id="track-type-badge" class="badge badge-music">MÜZİK</span>
                        </div>
                        <h2 id="now-playing-title" class="marquee">Şarkı Seçilmedi</h2>
                        <h3 id="now-playing-artist">Radyoyu Başlatın</h3>
                    </div>

                    <!-- Progress Bar -->
                    <div class="progress-container">
                        <span id="current-time">00:00</span>
                        <div class="progress-bar-wrapper" id="progress-bar-wrapper">
                            <div class="progress-bar" id="progress-bar"></div>
                            <div class="progress-handle" id="progress-handle"></div>
                        </div>
                        <span id="total-time">00:00</span>
                    </div>

                    <!-- Player Controls -->
                    <div class="player-controls">
                        <button id="prev-btn" class="ctrl-btn" title="Önceki">
                            <i data-lucide="skip-back"></i>
                        </button>
                        <button id="play-btn" class="ctrl-btn play-btn" title="Oynat / Duraklat">
                            <i data-lucide="play" id="play-icon"></i>
                        </button>
                        <button id="next-btn" class="ctrl-btn" title="Sonraki">
                            <i data-lucide="skip-forward"></i>
                        </button>
                    </div>

                    <!-- Volume Control & Extras -->
                    <div class="extra-controls">
                        <div class="volume-container">
                            <button id="mute-btn" class="icon-btn" title="Sessiz">
                                <i data-lucide="volume-2" id="volume-icon"></i>
                            </button>
                            <div class="volume-slider-wrapper" id="volume-slider-wrapper">
                                <div class="volume-bar" id="volume-bar" style="width: 80%;"></div>
                            </div>
                        </div>

                        <div class="toggle-buttons">
                            <button id="shuffle-btn" class="icon-btn" title="Karıştır">
                                <i data-lucide="shuffle"></i>
                            </button>
                            <button id="live-mode-btn" class="icon-btn" title="Senkronize Canlı Simülasyon">
                                <i data-lucide="radio-tower"></i>
                                <span class="btn-label-tooltip">Canlı Sim.</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- FOOTER -->
        <footer class="app-footer">
            <p>BLACK FM © 2026. GitHub Pages Uyumlu Statik Radyo.</p>
            <div class="footer-links">
                <span>Geliştirici Araçları</span>
                <span class="divider">|</span>
                <a href="#" id="test-jingle-btn" class="footer-action-link"><i data-lucide="play-circle"></i> Hemen Jingle Tetikle</a>
            </div>
        </footer>
    </div>

    <!-- Background Audio element -->
    <audio id="audio-player" crossorigin="anonymous"></audio>

    <!-- Load scripts -->
    <script src="playlist.js"></script>
    <script src="app.js"></script>
</body>
</html>
